<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stylewright</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <img class="logo" src="/icon/32.png" alt="" width="28" height="28" />
          <div class="titles">
            <span class="app-name">Stylewright</span>
            <span id="host" class="host" title="The site these styles apply to">—</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="menuBtn" class="icon-btn" aria-label="Menu" aria-haspopup="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="5" cy="12" r="1.6" fill="currentColor" />
              <circle cx="12" cy="12" r="1.6" fill="currentColor" />
              <circle cx="19" cy="12" r="1.6" fill="currentColor" />
            </svg>
          </button>
        </div>
      </header>

      <div id="banner" class="banner" hidden></div>

      <main class="editor-wrap">
        <div id="editor" class="editor"></div>
        <div id="overlay" class="overlay" hidden>
          <p id="overlayText">This page can’t be styled.</p>
        </div>
      </main>

      <label
        id="autoApplyRow"
        class="auto-row switch-row"
        title="Re-apply this site’s CSS automatically on every page load"
      >
        <span>Apply automatically on page load</span>
        <input id="autoApply" type="checkbox" role="switch" />
      </label>

      <footer class="actionbar">
        <span id="status" class="status" role="status" aria-live="polite"></span>
        <div class="buttons">
          <button id="clearBtn" class="btn btn-ghost" type="button" title="Empty the editor (does not change saved styles)">
            Clear
          </button>
          <button id="disableBtn" class="btn btn-ghost" type="button" title="Stop applying, but keep the saved CSS">
            Disable
          </button>
          <button id="applyBtn" class="btn btn-primary" type="button" title="Inject this CSS into the page">
            Apply
          </button>
        </div>
      </footer>

      <div id="menu" class="menu" hidden role="menu">
        <label class="menu-row switch-row">
          <span>Disable all overrides</span>
          <input id="killSwitch" type="checkbox" role="switch" />
        </label>
        <hr />
        <button id="clearSiteBtn" class="menu-row" type="button" role="menuitem">
          Delete saved styles for this site
        </button>
        <hr />
        <button id="exportBtn" class="menu-row" type="button" role="menuitem">Export all…</button>
        <button id="importBtn" class="menu-row" type="button" role="menuitem">Import…</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
