name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Supply-chain signal: fail on known high-severity advisories in runtime
      # deps, and verify registry signatures of the installed tree. Kept
      # non-blocking on the audit advisory check to avoid red builds from
      # transitive dev-only issues; tighten by dropping continue-on-error.
      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Verify package signatures
        run: npm audit signatures

      - name: Lint & format check
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package zip
        run: npm run zip

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chrome-mv3
          path: .output/*.zip
          if-no-files-found: error
          # WXT outputs to .output/, a dotfile dir; upload-artifact@v4 excludes
          # hidden paths by default, so opt them back in.
          include-hidden-files: true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Install Playwright Chromium
        # --no-install forbids npx's network fallback: resolve the local binary
        # or fail, never silently fetch a same-named package from the registry.
        run: npm exec --no-install -- playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
