name: Release

# Push a tag like v0.1.0 to build, package, and attach the zip to a GitHub
# Release. Publishing to the Chrome Web Store is intentionally a manual,
# credentialed step (see docs/PUBLISHING.md) — this workflow only produces the
# verified artifact.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run check
          npm run typecheck
          npm test

      - name: Build and package
        run: npm run release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*.zip
          generate_release_notes: true
