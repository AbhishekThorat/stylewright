name: Release

# Trunk-based: cut a release by tagging vX.Y.Z on main. The tag is the deploy
# trigger — this job verifies, builds, attaches the zip to a GitHub Release, and
# (when the Chrome Web Store secrets are configured) uploads and publishes the
# new version automatically. See docs/PUBLISHING.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run check
          npm run typecheck
          npm test

      - name: Build and package
        run: npm run release

      # Copy the zip out of the hidden .output/ dir so release tooling never
      # trips on dotfile-directory globbing.
      - name: Stage artifact
        run: |
          mkdir -p dist
          cp .output/*-chrome.zip dist/
          echo "ZIP_PATH=$(ls dist/*-chrome.zip | head -1)" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

      - name: Publish to Chrome Web Store
        if: ${{ env.CLIENT_ID != '' && env.EXTENSION_ID != '' }}
        run: |
          echo "Uploading $ZIP_PATH to extension $EXTENSION_ID and publishing…"
          npx chrome-webstore-upload --source "$ZIP_PATH" --extension-id "$EXTENSION_ID"

      - name: Note when store publish is skipped
        if: ${{ env.CLIENT_ID == '' || env.EXTENSION_ID == '' }}
        run: echo "::notice::Chrome Web Store secrets not configured — created the GitHub Release only. Add the CWS_* secrets to enable auto-publish (see docs/PUBLISHING.md)."
